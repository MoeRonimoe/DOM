    function loadLevel(leveldata){
        return new Promise((resolve, reject) => {
            e1m1 = leveldata;
            e1m1['LINEDEFS'].forEach(function (single_linedef, key) {
                addPlane(single_linedef, key);
                if (single_linedef['sidefront'] != 65535) {
                    if (Array.isArray(sectorlist[e1m1['SIDEDEFS'][single_linedef['sidefront']]['sector']])) {
                        sectorlist[e1m1['SIDEDEFS'][single_linedef['sidefront']]['sector']].push(key);
                    } else {
                        sectorlist[e1m1['SIDEDEFS'][single_linedef['sidefront']]['sector']] = [];
                        sectorlist[e1m1['SIDEDEFS'][single_linedef['sidefront']]['sector']].push(key);
                    }
                }
                if (single_linedef['sideback'] != 65535) {
                    if (Array.isArray(sectorlist[e1m1['SIDEDEFS'][single_linedef['sideback']]['sector']])) {
                        sectorlist[e1m1['SIDEDEFS'][single_linedef['sideback']]['sector']].push(key);
                    } else {
                        sectorlist[e1m1['SIDEDEFS'][single_linedef['sideback']]['sector']] = [];
                        sectorlist[e1m1['SIDEDEFS'][single_linedef['sideback']]['sector']].push(key);
                    }
                }
            });
            e1m1['SECTORS'].forEach(function (sector, key) {
                addFloor(sector, key);
                addCeiling(sector, key);
            });
            e1m1['THINGS'].forEach(function (thing) {
                if (thing.thingType == 1) {
                    // Für BSP:
                    player.mapX = thing.xPosition;
                    player.mapY = thing.yPosition;

                    // Für Rendering:
                    player.pos.x = -(thing.xPosition * scalefactor);
                    player.pos.z = -(thing.yPosition * scalefactor);
                }
            });

            let doomMinX = Infinity, doomMinY = Infinity;
            let doomMaxX = -Infinity, doomMaxY = -Infinity;

            for (let v of e1m1.VERTEXES) {
                doomMinX = Math.min(doomMinX, v.x);
                doomMaxX = Math.max(doomMaxX, v.x);
                doomMinY = Math.min(doomMinY, v.y);
                doomMaxY = Math.max(doomMaxY, v.y);
            }

            const engineX = player.pos.x;
            const engineZ = player.pos.z;

            const offsetX = engineX - doomMinX * scalefactor;
            const offsetY = engineZ + doomMinY * scalefactor;

            let engMinX = Infinity, engMaxX = -Infinity;
            let engMinZ = Infinity, engMaxZ = -Infinity;

            for (let v of e1m1.VERTEXES) {
                // Engine-Koordinaten der Map-Vertices
                const ex = v.x * 0.2;   // deine Engine skaliert mit 0.2
                const ez = -v.y * 0.2;  // deine Engine invertiert Y → Z

                engMinX = Math.min(engMinX, ex);
                engMaxX = Math.max(engMaxX, ex);
                engMinZ = Math.min(engMinZ, ez);
                engMaxZ = Math.max(engMaxZ, ez);
            }

            console.log("ENGINE MAP BOUNDS:", engMinX, engMaxX, engMinZ, engMaxZ);


            window.doomOffset = { offsetX, offsetY, scalefactor };

            window.doomBounds = {
                minX: doomMinX,
                minY: doomMinY,
                maxX: doomMaxX,
                maxY: doomMaxY
            };


            //updateTree();
            resolve();
        });

    }

        }

    var speed = 0;

    function slowdown(){
        var decreaso = .05;
        if(speed > 0){
            if(speed > 0 && speed < decreaso){
                speed = 0;
            }else {
                speed -= decreaso;
            }
        }else if(speed < 0){
            if(speed < 0 && speed > -decreaso){
                speed = 0;
            }else {
                speed += decreaso;
            }
        }
    }

            //    speed += .5;
        }
        if (e.keyCode == '83') {   // S
            backward = true;

        }

    }

    function applySpeed(){
        var xo = Math.sin(player.camerarot.y * (Math.PI/180));
        var yo = Math.cos(player.camerarot.y * (Math.PI/180));
        player.pos.x -= xo * speed;
        player.pos.z -= yo * speed;
        debugdata.playerposx = player.pos.x;
        debugdata.playerposz = player.pos.z;
    }

    function getMinMaxSectorVals(secnr){
        var min_x = 100000;
        var min_y = 100000;
        var max_x = -140000;
        var max_y = -140000;
        sectorlist[secnr].forEach(function(LINEDEFSnr,key){
            var v1 = e1m1['VERTEXES'][e1m1['LINEDEFS'][parseInt(LINEDEFSnr)]['startVertex']];
            var v2 = e1m1['VERTEXES'][e1m1['LINEDEFS'][parseInt(LINEDEFSnr)]['endVertex']];
            //Min
            if(parseFloat(v1['x']) < min_x){
                min_x = parseFloat(v1['x']);
            }
            if(parseFloat(v2['x']) < min_x){
                min_x = parseFloat(v2['x']);
            }
            if(parseFloat(v1['y']) < min_y){
                min_y = parseFloat(v1['y']);
            }
            if(parseFloat(v2['x']) < min_y){
                min_y = parseFloat(v2['x']);
            }
            //Max
            if(parseFloat(v1['x']) > max_x){
                max_x = parseFloat(v1['x']);
            }
            if(parseFloat(v2['x']) > max_x){
                max_x = parseFloat(v2['x']);
            }
            if(parseFloat(v1['y']) > max_y){
                max_y = parseFloat(v1['y']);
            }
            if(parseFloat(v2['y']) > max_y){
                max_y = parseFloat(v2['y']);
            }
        });
        return {'min_x':min_x,'max_x':max_x,'min_y':min_y,'max_y':max_y, 'height': sectorlist[secnr]['floorHeight']}
    }

    function ListSectorAngles(secnr){
        var secminmax = getMinMaxSectorVals(secnr);
        var xdif = secminmax['max_x'] - secminmax['min_x'];
        var ydif = secminmax['max_y'] - secminmax['min_y'];
        var center = {'x':(secminmax['min_x']+xdif-1),'y':(secminmax['min_y']+ydif-1)};
        var anglist = Array();
        sectorlist[secnr].forEach(function(LINEDEFSnr,key){
            var v1 = e1m1['VERTEXES'][e1m1['LINEDEFS'][LINEDEFSnr]['startVertex']];
            var v2 = e1m1['VERTEXES'][e1m1['LINEDEFS'][LINEDEFSnr]['endVertex']];
            var rad = Math.atan2((parseFloat(v1['y']) - parseFloat(center['y'])), (parseFloat(v1['x']) - parseFloat(center['x'])));
            // anglist.splice([e1m1['LINEDEFS'][parseInt(LINEDEFSnr)]['startVertex']],0,rad);
            if (!anglist.hasOwnProperty(e1m1['LINEDEFS'][parseInt(LINEDEFSnr)]['startVertex'])) {
                anglist[e1m1['LINEDEFS'][parseInt(LINEDEFSnr)]['startVertex']] = (rad * (180/Math.PI)+360)%360;
                // anglist[e1m1['LINEDEFS'][parseInt(LINEDEFSnr)]['startVertex']] = rad;
            }
            rad = Math.atan2((parseFloat(v2['y']) - parseFloat(center['y'])), (parseFloat(v2['x']) - parseFloat(center['x'])));
            // anglist.splice([e1m1['LINEDEFS'][parseInt(LINEDEFSnr)]['endVertex']],0,rad);
            if (!anglist.hasOwnProperty(e1m1['LINEDEFS'][parseInt(LINEDEFSnr)]['endVertex'])) {
                anglist[e1m1['LINEDEFS'][parseInt(LINEDEFSnr)]['endVertex']] = (rad * (180/Math.PI)+360)%360;
                // anglist[e1m1['LINEDEFS'][parseInt(LINEDEFSnr)]['endVertex']] = rad;
            }
        });
        return anglist;
    }

        function findConnectingVERTEXES(usedLDs,VERTEXES){
            var ldlist = sectorlist[secnr];
            var result = null;
            ldlist.forEach(function (val,key){
                if(!usedLDs.includes(val)){
                    var ld = e1m1['LINEDEFS'][val];
                    if(ld['startVertex'] == VERTEXES || ld['endVertex'] == VERTEXES){
                        result = val;
                    }
                }
            });
            return result;
        }

        var diesersector = sectorlist[secnr];
        var v1 = e1m1['VERTEXES'][e1m1['LINEDEFS'][parseInt(diesersector[0])]['startVertex']];
        var v2 = e1m1['VERTEXES'][e1m1['LINEDEFS'][parseInt(diesersector[0])]['endVertex']];
        clippath += (100-((v1['x']-min_x) / x1perc)) + '% ' + (((v1['y']-min_y) / y1perc)) + '%, ' + (100-((v2['x']-min_x) / x1perc)) + '% ' + (((v2['y']-min_y) / y1perc))+'%';

                searchVector = e1m1['LINEDEFS'][parseInt(nextld)]['startVertex'];
            }
            usedLds.push(nextld);
            nextld = findConnectingVERTEXES(usedLds, searchVector);
        }

    function doomToMinimap(x, y, player, canvas) {
        const scale = 0.2;        // Doom → Engine
        const minimapScale = 0.07; // Engine → Minimap

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        // Doom → Engine
        const ex = x * scale;
        const ez = -y * scale;

        // Engine → Minimap (relativ zum Spieler)
        const mx = centerX + (ex - player.pos.x) * minimapScale;
        const my = centerY + (ez - player.pos.z) * minimapScale;

        return { mx, my };
    }

    function findSector(sector_area, x, y) {
        let bestSector = null; // Speichert den Sektor mit der kleinsten Fläche
        let minArea = Infinity; // Startwert für die minimale Fläche

        for (let secnr in sector_area) {
            let sector = sector_area[secnr];
            if (
                x >= (sector.min_x * scalefactor) && x <= (sector.max_x * scalefactor) &&
                y >= (sector.min_y * scalefactor) && y <= (sector.max_y * scalefactor)
            ) {
                // Berechnung der Fläche des aktuellen Sektors
                let area = (sector.max_x - sector.min_x) * (sector.max_y - sector.min_y);

                if (area < minArea) {
                    minArea = area;
                    bestSector = secnr;
                }
            }
        }

        return bestSector; // Gibt den Sektor mit der kleinsten Fläche zurück oder null, falls kein Treffer
    }

    function drawVisibleSectorsOnMap(ctx, visible) {
        ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);

        const { visibleSSECTORS } = visible;
        const ssectors  = e1m1.SSECTORS;
        const segs      = e1m1.SEGS;
        const vertexes  = e1m1.VERTEXES;

        const halfFov = (90 * Math.PI / 180) / 2;

        // Spieler in DOOM-Space
        const doomX = -(player.pos.x / 0.2);
        const doomY = -(player.pos.z / 0.2);

        // Doom → Minimap
        const pmx = doomX * 0.07 + minimapadjustval;
        const pmy = -(doomY * 0.07) - minimapadjustval;

        // Doom-Winkel
        const ang = lastBspAngle * Math.PI / 180;

        for (const ssIndex of visibleSSECTORS) {
            const ss = ssectors[ssIndex];

            for (let i = 0; i < ss.segCount; i++) {
                const seg = segs[ss.firstSeg + i];
                const v1  = vertexes[seg.startVertex];
                const v2  = vertexes[seg.endVertex];

                // Mittelpunkt in DOOM-Space
                const mx = (v1.x + v2.x) / 2;
                const my = (v1.y + v2.y) / 2;

                // FOV-Test in DOOM-Space
                const dx = mx - doomX;
                const dy = my - doomY;

                const a = Math.atan2(dy, dx);
                let da = a - ang;

                while (da < -Math.PI) da += 2 * Math.PI;
                while (da >  Math.PI) da -= 2 * Math.PI;

                if (Math.abs(da) > halfFov) continue;

                // Segment zeichnen: DOOM → Minimap
                const m1x = v1.x * 0.07 + minimapadjustval;
                const m1y = -(v1.y * 0.07) - minimapadjustval;

                const m2x = v2.x * 0.07 + minimapadjustval;
                const m2y = -(v2.y * 0.07) - minimapadjustval;

                ctx.beginPath();
                ctx.moveTo(m1x, m1y);
                ctx.lineTo(m2x, m2y);
                ctx.stroke();
            }
        }
    }

    class Node {
        constructor(xPartition, yPartition, changeX, changeY, rightBoundingBox, leftBoundingBox, rightChild, leftChild) {
            this.xPartition = xPartition;
            this.yPartition = yPartition;
            this.changeX = changeX;
            this.changeY = changeY;

    function buildBspTree(nodes) {
        if (!Array.isArray(nodes) || nodes.length === 0) {
            throw new Error("Das 'nodes'-Array ist undefiniert oder leer.");
        }

        const nodeObjects = nodes.map(node => new Node(
            node.xPartition,
            node.yPartition,
            node.changeX,
            node.changeY,
            {
                top: node.rightBoundingBoxTop,
                bottom: node.rightBoundingBoxBottom,
                left: node.rightBoundingBoxLeft,
                right: node.rightBoundingBoxRight,
            },
            {
                top: node.leftBoundingBoxTop,
                bottom: node.leftBoundingBoxBottom,
                left: node.leftBoundingBoxLeft,
                right: node.leftBoundingBoxRight,
            },
            node.rightChild,
            node.leftChild
        ));

        // Finde den höchstnummerierten Eintrag (Wurzelknoten)
        const rootIndex = nodeObjects.length - 1; // Höchste Nummer = letzter Index
        console.log("rootIndex",rootIndex);

        function constructTree(nodeList, index) {
            if (index < 0 || index >= nodeList.length) {
                return null; // Kein Kindknoten vorhanden
            }

            // Hole den aktuellen Knoten
            const currentNode = nodeList[index];

            // Rekursiv die Kinder des aktuellen Knotens bauen
            currentNode.rightChild = currentNode.rightChild >= 0
                ? constructTree(nodeList, currentNode.rightChild)
                : null;

            currentNode.leftChild = currentNode.leftChild >= 0
                ? constructTree(nodeList, currentNode.leftChild)
                : null;

            return currentNode;
        }
        console.log("nodeObjects",nodeObjects);

        return constructTree(nodeObjects, rootIndex); // Der höchstnummerierte Eintrag ist die Wurzel
    }

    function findVisibleAreaOld(node, playerX, playerY) {
        if (!node) {
            return null; // Kein sichtbarer Bereich, Ende des Baumes erreicht
        }

        // Berechnung der Position relativ zur Trennlinie (xPartition und yPartition)
        const side = (playerX - node.xPartition) * node.changeY - (playerY - node.yPartition) * node.changeX;

        if (side >= 0) {
            // Spieler befindet sich auf der rechten Seite
            if (node.rightChild) {
                return findVisibleArea(node.rightChild, playerX, playerY); // Weiter nach rechts
            } else {
                return node.rightBoundingBox; // Kein rechter Kindknoten - gib rechte Bounding-Box zurück
            }
        } else {
            // Spieler befindet sich auf der linken Seite
            if (node.leftChild) {
                return findVisibleArea(node.leftChild, playerX, playerY); // Weiter nach links
            } else {
                return node.leftBoundingBox; // Kein linker Kindknoten - gib linke Bounding-Box zurück
            }
        }
    }

    function findVisibleArea(node, playerX, playerY) {
        if (!node) {
            console.log("Ende des Baums erreicht.");
            return null;
        }

        const side = (-playerX - node.xPartition) * node.changeY - (playerY - node.yPartition) * node.changeX;

        // Falls beide changeX und changeY null sind, könnte dies ein Problem mit der Definition der Partitionsebene sein:
        if (node.changeX === 0 && node.changeY === 0) {
            console.error("Ungültige Partitionsebene! changeX und changeY sollten nicht beide null sein.");
        }
        console.log("Aktueller Knoten:", node);
        console.log("Berechnete Seite:", side);
        console.log("BERECHNUNG: ","(",playerX," - ",node.xPartition,") * ",node.changeY," - (",playerY," - ",node.yPartition,") * ",node.changeX)

        if (side >= 0) {
            console.log("Spieler ist auf der rechten Seite.");
            return node.rightChild ? findVisibleArea(node.rightChild, -playerX, playerY) : node.rightBoundingBox;
        } else {
            console.log("Spieler ist auf der linken Seite.");
            return node.leftChild ? findVisibleArea(node.leftChild, -playerX, playerY) : node.leftBoundingBox;
        }
    }

    function bboxInFOV(bbox, px, py, angle) {
        if (!bbox) return false;

        const fov = Math.PI / 3; // 60°

        const [top, bottom, left, right] = bbox;

        const points = [
            [left, top],
            [right, top],
            [left, bottom],
            [right, bottom]
        ];

        for (const [x, y] of points) {
            const dx = x - px;
            const dy = y - py;
            const ang = Math.atan2(dy, dx);

            let diff = ang - angle;
            while (diff > Math.PI) diff -= 2 * Math.PI;
            while (diff < -Math.PI) diff += 2 * Math.PI;

            if (Math.abs(diff) < fov * 0.5) {
                return true;
            }
        }

        return false;
    }


    function getNodeBBoxes(node) {
        const frontBBox = [
            node.rightBoundingBoxTop,
            node.rightBoundingBoxBottom,
            node.rightBoundingBoxLeft,
            node.rightBoundingBoxRight
        ];

        const backBBox = [
            node.leftBoundingBoxTop,
            node.leftBoundingBoxBottom,
            node.leftBoundingBoxLeft,
            node.leftBoundingBoxRight
        ];

        return { frontBBox, backBBox };
    }


    function computeVisibleSectors(e1m1, playerX, playerY, _playerAngleDeg) {
        const nodes    = e1m1.NODES;
        const ssectors = e1m1.SSECTORS;
        const segs     = e1m1.SEGS;
        const linedefs = e1m1.LINEDEFS;
        const sidedefs = e1m1.SIDEDEFS;

        const visibleSectors  = new Set();
        const visibleSSECTORS = new Set();

        function pointOnFrontSide(node, x, y) {
            const dx = x - node.xPartition;
            const dy = y - node.yPartition;
            const side = dx * node.changeY - dy * node.changeX;
            return side > 0;
        }

        function traverseSubsector(ssIndex) {
            if (ssIndex < 0 || ssIndex >= ssectors.length) return;

            const ss = ssectors[ssIndex];
            visibleSSECTORS.add(ssIndex);

            for (let i = 0; i < ss.segCount; i++) {
                const seg = segs[ss.firstSeg + i];
                const ld  = linedefs[seg.linedef];
                const sidedefIndex = (seg.direction === 0) ? ld.sidefront : ld.sideback;
                if (sidedefIndex !== 65535) {
                    visibleSectors.add(sidedefs[sidedefIndex].sector);
                }
            }
        }

        function traverseNode(nodeIndex) {
            const node = nodes[nodeIndex];
            if (!node) return;

            const front = pointOnFrontSide(node, playerX, playerY);

            const frontChild = front ? node.rightChild : node.leftChild;
            const backChild  = front ? node.leftChild  : node.rightChild;

            if (frontChild & 0x8000) {
                traverseSubsector(frontChild & 0x7FFF);
            } else {
                traverseNode(frontChild);
            }

            if (backChild & 0x8000) {
                traverseSubsector(backChild & 0x7FFF);
            } else {
                traverseNode(backChild);
            }
        }

        traverseNode(nodes.length - 1);

        return {
            visibleSectors:  Array.from(visibleSectors),
            visibleSSECTORS: Array.from(visibleSSECTORS)
        };
    }





    var lastTime = 0; // Zeitstempel des letzten Frames
    var fps = 0; // Aktuelle FPS

    function gameloop() {
        console.log("GAMELOOP");

        var currentTime = Date.now();
        const deltaTime = currentTime - lastTime;
        lastTime = currentTime;

        fps = 1000 / deltaTime;
        debugdata.fps = fps.toFixed(2);

        if (forward && speed < 1) speed += .1;
        if (backward && speed > -1) speed -= .1;

        if (level_loaded) {
            slowdown();
            applySpeed();
            setTransform();

            const visible = updateVisibility();
            const canvassec = document.getElementById("minimapSectors");
            const ctx = canvassec.getContext("2d");
            drawVisibleSectorsOnMap(ctx, visible);
            drawPlayerPositionOnMap();

            updateDebugInfo();
        }

        requestAnimationFrame(gameloop);
    }

    requestAnimationFrame(gameloop);


</script>
